<div class="bloom">
  <svg viewBox="0 0 200 300" class="bloom__svg" aria-hidden="true">

    <!-- Trunk: grows upward from bottom center -->
    <line x1="100" y1="280" x2="100" y2="120" class="bloom__trunk" stroke-linecap="round"/>

    <!-- Branch 1 (right, lowest) -->
    <line x1="100" y1="240" x2="140" y2="215" class="bloom__branch bloom__branch--1" stroke-linecap="round"/>

    <!-- Branch 2 (left) -->
    <line x1="100" y1="215" x2="55"  y2="190" class="bloom__branch bloom__branch--2" stroke-linecap="round"/>

    <!-- Branch 3 (right) -->
    <line x1="100" y1="190" x2="150" y2="160" class="bloom__branch bloom__branch--3" stroke-linecap="round"/>

    <!-- Branch 4 (left) -->
    <line x1="100" y1="165" x2="50"  y2="135" class="bloom__branch bloom__branch--4" stroke-linecap="round"/>

    <!-- Branch 5 (right, top) -->
    <line x1="100" y1="140" x2="145" y2="108" class="bloom__branch bloom__branch--5" stroke-linecap="round"/>

    <!-- Blossoms at branch tips -->
    <circle cx="140" cy="215" r="8"  class="bloom__blossom bloom__blossom--1"/>
    <circle cx="55"  cy="190" r="9"  class="bloom__blossom bloom__blossom--2"/>
    <circle cx="150" cy="160" r="10" class="bloom__blossom bloom__blossom--3"/>
    <circle cx="50"  cy="135" r="9"  class="bloom__blossom bloom__blossom--4"/>
    <circle cx="145" cy="108" r="11" class="bloom__blossom bloom__blossom--5"/>

    <!-- Crown blossom at the top of the trunk -->
    <circle cx="100" cy="110" r="13" class="bloom__blossom bloom__blossom--crown"/>
  </svg>

  <p class="bloom__text">{{ langService.t('bloom.preparing') }}</p>
</div>
