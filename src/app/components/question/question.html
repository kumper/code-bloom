<p class="text-secondary mb-3" [id]="'question-' + questionNumber()">
  {{ question() }}
</p>

<div class="question__snippet bg-light p-3 rounded-3 mb-3">
  <code class="text-dark">
    <pre class="m-0">{{ codeSnippet() }}</pre>
  </code>
</div>

<div class="d-flex flex-column gap-2 mb-3" role="radiogroup" [attr.aria-labelledby]="'question-' + questionNumber()">
  @for (answer of answers(); track answer.label) {
    <label
      class="question__answer bg-light border border-2 rounded-3 p-3 d-flex align-items-start"
      [class.question__answer--selected]="selectedAnswerValue() === answer.label"
    >
      <input
        type="radio"
        [name]="'q' + questionNumber()"
        [value]="answer.label"
        [checked]="selectedAnswerValue() === answer.label"
        (change)="selectedAnswerValue.set(answer.label)"
        class="me-2 mt-1 flex-shrink-0"
        [attr.aria-label]="answer.label + ': ' + langService.pick(answer.textEN, answer.textPL)"
      />
      <div class="question__answer-body">
        <span class="fw-semibold me-2 question__answer-label">{{ answer.label }})</span>
        <span class="text-dark">{{ langService.pick(answer.textEN, answer.textPL) }}</span>
      </div>
    </label>
  }
</div>

<button
  class="btn btn--pink text-white fw-semibold w-100 py-2 rounded-pill"
  (click)="onSubmit()"
  [disabled]="!selectedAnswerValue()"
  type="button"
  [attr.aria-disabled]="!selectedAnswerValue()"
>
  {{ langService.t('quiz.submitBtn') }}
</button>

@if (tags().length > 0) {
  <ul class="mt-3 text-center list-unstyled mb-0" aria-label="Question tags">
    @for (tag of tags(); track tag) {
      <li class="d-inline">
        <button
          type="button"
          class="question__tag badge text-white px-3 py-1 rounded-pill shadow-sm me-1 border-0"
          [title]="langService.t('tag.tooltip')"
          [attr.aria-label]="langService.t('tag.ariaLabel', {tag: tag})"
          (click)="tagClick.emit(tag)">
          {{ tag }}
        </button>
      </li>
    }
  </ul>
}
