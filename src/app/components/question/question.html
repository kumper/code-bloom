<p class="text-secondary mb-3" [id]="'question-' + questionNumber()">
  {{ question() }}
</p>

<div class="code-snippet bg-light p-3 rounded-3 mb-3">
  <code class="text-dark">
    <pre class="m-0">{{ codeSnippet() }}</pre>
  </code>
</div>

<div class="d-flex flex-column gap-2 mb-3" role="radiogroup" [attr.aria-labelledby]="'question-' + questionNumber()">
  @for (answer of answers(); track answer.label) {
    <label
      class="answer-option bg-light border border-2 rounded-3 p-3 d-flex align-items-start"
      [class.selected]="selectedAnswer() === answer.label"
    >
      <input
        type="radio"
        [name]="'q' + questionNumber()"
        [value]="answer.label"
        [(ngModel)]="selectedAnswerValue"
        (change)="onAnswerChange()"
        class="me-2 mt-1 flex-shrink-0"
        [attr.aria-label]="answer.label + ': ' + (langService.lang() === 'pl' ? answer.textPL : answer.textEN)"
      />
      <div class="answer-content">
        <span class="fw-semibold me-2 answer-label">{{ answer.label }})</span>
        <span class="text-dark answer-text">{{ langService.lang() === 'pl' ? answer.textPL : answer.textEN }}</span>
      </div>
    </label>
  }
</div>

<button
  class="btn btn-submit btn-pink text-white fw-semibold w-100 py-2 rounded-pill"
  (click)="onSubmit()"
  [disabled]="!selectedAnswerValue"
  type="button"
  [attr.aria-disabled]="!selectedAnswerValue"
>
  {{ langService.t('quiz.submitBtn') }}
</button>

@if (tags().length > 0) {
  <div class="mt-3 text-center" role="list" aria-label="Question tags">
    @for (tag of tags(); track tag) {
      <span
        class="question-tag badge text-white px-3 py-1 rounded-pill shadow-sm me-1"
        role="listitem"
      >
        {{ tag }}
      </span>
    }
  </div>
}
