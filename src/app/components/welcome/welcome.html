<app-generic-frame>
  <div class="text-center mb-4">
    <h2 class="fw-bold welcome__heading mb-2">{{ langService.t('welcome.heading') }}</h2>
    <p class="text-secondary mb-0">{{ langService.t('welcome.subtitle') }}</p>
  </div>

  <form>
    <div class="mb-3">
      <label for="username" class="form-label fw-semibold">{{ langService.t('welcome.nameLabel') }}</label>
      <input
        id="username"
        type="text"
        class="form-control"
        [class.is-invalid]="usernameControl.invalid && usernameControl.touched"
        [placeholder]="langService.t('welcome.namePlaceholder')"
        [formControl]="usernameControl"
        autocomplete="name"
        autofocus
        (keydown.enter)="$event.preventDefault(); onSubmit()"
      />
      @if (usernameControl.invalid && usernameControl.touched) {
        <div class="invalid-feedback">{{ langService.t('welcome.nameError') }}</div>
      }
    </div>

    <p class="welcome__disclaimer text-muted mb-3">{{ langService.t('welcome.disclaimer') }}</p>

    <button type="button" (click)="onSubmit()"
            class="btn btn--pink text-white fw-semibold w-100 py-2 rounded-pill">
      {{ langService.t('welcome.startBtn') }}
    </button>
  </form>
</app-generic-frame>
